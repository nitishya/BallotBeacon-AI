# GCP Cloud Build - Unified Build for Main/Master
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ballotbeacon-ai:$COMMIT_SHA', '.', '-t', 'gcr.io/$PROJECT_ID/ballotbeacon-ai:latest']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ballotbeacon-ai:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ballotbeacon-ai:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ballotbeacon-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ballotbeacon-ai:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/ballotbeacon-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ballotbeacon-ai:latest'
