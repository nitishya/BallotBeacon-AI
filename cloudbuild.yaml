steps:
  # 1. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ballotbeacon-backend', '.']
    dir: 'backend'
    id: 'build-backend'

  # 2. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbeacon-frontend'
      - '--build-arg'
      - '_VITE_API_URL=$_BACKEND_URL'
      - '.'
    dir: 'frontend'
    id: 'build-frontend'

images:
  - 'gcr.io/$PROJECT_ID/ballotbeacon-backend'
  - 'gcr.io/$PROJECT_ID/ballotbeacon-frontend'
